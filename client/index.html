<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#D1E8FF">
    <title>NetPet Client</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="./assets/favicon.png">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">
    <link rel="manifest" href="./manifest.json">
    
    <style>
        /* Hovedstil for hele siden */
        body {
            margin: 0;
            padding: 0;
            /* Myk pastell-gradient som matcher resten av spillet */
            background: linear-gradient(135deg, #E9D8FD 0%, #BEE3F8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Pixelify Sans', sans-serif;
            color: #4A5568;
        }

        main {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        /* Skjuler den store H1-tittelen siden UserView har sin egen logo */
        h1 {
            display: none;
        }

        /* Den store gifen på forsiden */
        .front-gif {
            width: 120px;
            height: auto;
            display: block;
            margin: 0 auto 20px;
            filter: drop-shadow(0 5px 15px rgba(180, 160, 255, 0.4));
        }

        footer {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
        }

        footer hr {
            border: 0;
            border-top: 1px solid rgba(180, 160, 255, 0.3);
            width: 50%;
            margin: 10px auto;
        }

        footer a {
            color: #553C9A;
            text-decoration: none;
            font-size: 0.8rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        footer a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* Skjules av app.mjs når man er logget inn */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <main id="main-content">
        <img src="./assets/creatureidle.gif" alt="creature idle movement" class="front-gif">
        
        <user-manager></user-manager>
    </main>

    <footer id="main-footer">
        <hr>
        <nav aria-label="Juridisk informasjon">
            <a href="tos.html">Terms of Service</a> | 
            <a href="privacy.html">Privacy Policy</a>
        </nav>
    </footer>

    <script type="module" src="./app.mjs"></script>
</body>
</html>
