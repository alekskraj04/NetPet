<style>
    /* Importer fonten på nytt her for å være sikker på at Shadow DOM ser den */
    @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap');

    .user-manager { 
        border: 2px solid #444; 
        padding: 20px; 
        border-radius: 10px; 
        background: #f9f9f9; 
        max-width: 400px;
        margin: 0 auto;
        font-family: sans-serif;
        text-align: center;
    }

    /* Bruker Pixelify Sans på overskriftene */
    h2, h3 {
        font-family: 'Pixelify Sans', sans-serif;
        color: #444;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .section {
        margin-bottom: 25px;
        padding-bottom: 15px;
    }

    .divider {
        border-top: 1px dashed #ccc;
        margin: 20px 0;
        position: relative;
    }

    .divider span {
        position: absolute;
        top: -12px;
        left: 50%;
        transform: translateX(-50%);
        background: #f9f9f9;
        padding: 0 10px;
        color: #777;
        font-size: 0.9em;
        font-family: 'Pixelify Sans', sans-serif;
    }

    .input-group { 
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    input {
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-family: sans-serif;
    }

    /* Felles styling for begge knappene */
    button {
        padding: 12px;
        cursor: pointer;
        border: 2px solid #444; /* Lagt til en mørkere kant for "pixel"-look */
        border-radius: 8px;
        font-weight: bold;
        font-family: 'Pixelify Sans', sans-serif;
        font-size: 1.1em;
        transition: transform 0.1s ease;
        
        /* Din nye pastellrosa farge */
        background-color: #ffcccc; 
        color: #444;
    }

    button:hover {
        background-color: #ffb3b3; /* Litt mørkere rosa ved hover */
        transform: scale(1.02);
    }

    button:active {
        transform: scale(0.98);
    }
</style>

<div class="user-manager">
    <div class="section">
        <h2>Create New Pet</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="Choose a Username">
            <input type="email" id="email" placeholder="Your Email">
            <button id="create-btn">Create & Start</button>
        </div>
    </div>

    <div class="divider">
        <span>OR</span>
    </div>

    <div class="section">
        <h3>Already have a pet?</h3>
        <div class="input-group">
            <input type="text" id="login-username" placeholder="Enter your username">
            <button id="login-btn">Log In</button>
        </div>
    </div>
</div>
