<style>
    /* Import font for Shadow DOM */
    @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap');

    .user-manager { 
        border: 2px solid #444; 
        padding: 20px; 
        border-radius: 10px; 
        background: #f9f9f9; 
        max-width: 400px;
        margin: 0 auto;
        font-family: sans-serif;
        text-align: center;
    }

    /* Pixel font for headings */
    h2, h3 {
        font-family: 'Pixelify Sans', sans-serif;
        color: #444;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .section {
        margin-bottom: 25px;
        padding-bottom: 15px;
    }

    .divider {
        border-top: 1px dashed #ccc;
        margin: 20px 0;
        position: relative;
    }

    .divider span {
        position: absolute;
        top: -12px;
        left: 50%;
        transform: translateX(-50%);
        background: #f9f9f9;
        padding: 0 10px;
        color: #777;
        font-size: 0.9em;
        font-family: 'Pixelify Sans', sans-serif;
    }

    .input-group { 
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    input {
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-family: sans-serif;
    }

    /* Button styling with pastel pink and pixel font */
    button {
        padding: 12px;
        cursor: pointer;
        border: 2px solid #444;
        border-radius: 8px;
        font-weight: bold;
        font-family: 'Pixelify Sans', sans-serif;
        font-size: 1.1em;
        transition: transform 0.1s ease;
        background-color: #ffcccc; 
        color: #444;
    }

    button:hover {
        background-color: #ffb3b3;
        transform: scale(1.02);
    }

    button:active {
        transform: scale(0.98);
    }
</style>

<div class="user-manager">
    <div class="section">
        <h2>Create New Pet</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="Choose a Username">
            <input type="password" id="password" placeholder="Choose a Password">
            <button id="create-btn">Create & Start</button>
        </div>
    </div>

    <div class="divider">
        <span>OR</span>
    </div>

    <div class="section">
        <h3>Already have a pet?</h3>
        <div class="input-group">
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button id="login-btn">Log In</button>
        </div>
    </div>
</div>
