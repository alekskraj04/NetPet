<style>
    :host {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        font-family: 'Pixelify Sans', sans-serif;
    }

    .header-container {
        text-align: center;
        margin-bottom: 5px;
    }

    /* Main Title Styling */
    h2 {
        color: #B4A0FF; 
        font-size: 3.5rem;
        margin: 0;
        text-transform: uppercase;
        text-shadow: 2px 2px #fff; 
        letter-spacing: 4px;
    }

    .sub-header {
        color: #6B7280; 
        font-size: 1rem;
        margin-top: -5px;
    }

    /* Login Form Container */
    .form-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        background: white; 
        padding: 30px;
        border-radius: 20px;
        border: 4px solid #BEE3F8; 
        width: 280px;
        box-shadow: 0 10px 20px rgba(180, 160, 255, 0.2);
    }

    input {
        padding: 12px;
        border-radius: 10px;
        border: 2px solid #E9D8FD; 
        font-family: 'Pixelify Sans', sans-serif;
        font-size: 1rem;
        background: #F9FAFB;
        outline: none;
        color: #4A5568;
    }

    input::placeholder {
        color: #A0AEC0;
    }

    .button-group {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 10px;
    }

    button {
        padding: 12px 18px;
        cursor: pointer;
        font-family: 'Pixelify Sans', sans-serif;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        font-size: 1rem;
        transition: all 0.2s ease;
    }

    button:hover {
        transform: scale(1.05);
        filter: brightness(1.05);
    }

    /* Action Buttons: Register and Login */
    #create-btn {
        background-color: #D6BCFA;
        color: #553C9A;
    }

    #login-btn {
        background-color: #BEE3F8;
        color: #2C5282;
    }
</style>

<div class="header-container">
    <h2>NETPET</h2>
    <div class="sub-header">Create account or log in</div>
</div>

<div class="form-container">
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    
    <div class="button-group">
        <button id="create-btn">Register</button>
        <button id="login-btn">Log In</button>
    </div>
</div>
