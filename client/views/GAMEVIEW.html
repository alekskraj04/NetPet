<style>
    .game-container { 
        text-align: center; 
        padding: 25px; 
        background: #F7FAFC; 
        border-radius: 25px; 
        border: 6px solid #D6BCFA; 
        font-family: 'Pixelify Sans', sans-serif;
        max-width: 400px;
        margin: auto;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }
    
    .pet-image {
        width: 160px;
        image-rendering: pixelated;
        margin: 15px 0;
    }

    .bar-label {
        font-size: 0.85rem;
        text-align: left;
        width: 85%;
        margin: 8px auto 0;
        text-transform: uppercase;
        color: #4A5568;
        font-weight: bold;
    }

    .status-bar { 
        width: 85%; 
        background: #EDF2F7; 
        margin: 5px auto 12px; 
        height: 22px; 
        border-radius: 12px; 
        border: 2px solid #CBD5E0;
        overflow: hidden;
    }
    
    #hunger-fill { width: 100%; background: #D6BCFA; height: 100%; transition: 0.5s; }
    #energy-fill { width: 100%; background: #BEE3F8; height: 100%; transition: 0.5s; }
    
    .button-group {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 20px;
    }

    button {
        padding: 12px 18px;
        font-size: 0.95rem;
        cursor: pointer;
        border-radius: 12px;
        border: none;
        background-color: #BEE3F8;
        color: #2C5282;
        font-family: 'Pixelify Sans', sans-serif;
        font-weight: bold;
        transition: transform 0.2s;
    }

    button:hover {
        transform: scale(1.05);
        background-color: #D6BCFA;
    }

    .share-box {
        margin-top: 25px;
        padding-top: 20px;
        border-top: 2px dashed #E2E8F0;
    }

    .share-box p { color: #718096; margin-bottom: 10px; }

    .share-box input {
        padding: 10px;
        width: 60%;
        border-radius: 8px;
        border: 2px solid #E2E8F0;
        font-family: inherit;
        outline: none;
    }

    #logout-btn {
        margin-top: 25px;
        background-color: #FED7E2;
        color: #702459;
    }
</style>

<div class="game-container">
    <h2 id="pet-name">MY PET</h2>
    
    <img src="/assets/creatureidle.gif" alt="Pet" class="pet-image" id="pet-image">
    
    <div class="bar-label">Hunger</div>
    <div class="status-bar"><div id="hunger-fill"></div></div>
    
    <div class="bar-label">Energy</div>
    <div class="status-bar"><div id="energy-fill"></div></div>
    
    <p id="status-text" style="color: #4A5568;">Status: HAPPY!</p>
    
    <div class="button-group">
        <button id="feed-btn">FEED 🍎</button>
        <button id="sleep-btn">SLEEP 💤</button>
    </div>

    <div class="share-box">
        <p style="font-size: 0.9rem;">Send Energy Booster</p>
        <input type="text" id="gift-target" placeholder="Recipient username">
        <button id="gift-btn">GIFT ⚡</button>
    </div>

    <button id="logout-btn">LOG OUT 👋</button>
</div>
