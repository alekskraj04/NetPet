<style>
    .game-container { 
        text-align: center; 
        padding: 20px; 
        background: #e0f7fa; 
        border-radius: 15px; 
        border: 4px solid #00acc1; 
        font-family: 'Pixelify Sans', sans-serif;
        max-width: 400px;
        margin: auto;
    }
    
    .pet-image {
        width: 200px;
        image-rendering: pixelated; /* Beholder pixel-stilen skarp */
        margin: 10px 0;
    }

    .status-bar { 
        width: 85%; 
        background: #ccc; 
        margin: 15px auto; 
        height: 25px; 
        border-radius: 12px; 
        border: 2px solid #333;
        overflow: hidden;
    }
    
    #hunger-fill { 
        width: 100%; 
        background: #4caf50; 
        height: 100%; 
        transition: width 0.5s ease-in-out, background-color 0.5s; 
    }
    
    .button-group {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 25px;
    }

    button {
        padding: 12px 20px;
        font-size: 1rem;
        cursor: pointer;
        border-radius: 8px;
        border: 3px solid #7a4d86;
        background-color: #9a67a6;
        color: white;
        font-family: 'Pixelify Sans', sans-serif;
    }

    button:hover {
        transform: scale(1.05);
    }

    #logout-btn {
        background-color: #ff9999;
        border-color: #cc7777;
    }
    
    #logout-btn:hover {
        background-color: #ff6666;
    }
</style>

<div class="game-container">
    <h2 id="pet-name">MY PET</h2>
    
    <img src="/assets/creatureidle.gif" alt="My Pet" class="pet-image">
    
    <div class="status-bar">
        <div id="hunger-fill"></div>
    </div>
    
    <p id="status-text">Status: HAPPY!</p>
    
    <div class="button-group">
        <button id="feed-btn">FEED 🍎</button>
        <button id="logout-btn">LOG OUT 👋</button>
    </div>
</div>
